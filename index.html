<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chords Voicings Scales</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6f8;
        color: #171a20;
        --role-root: #d84b4b;
        --role-seventh: #c88719;
        --role-third: #ff4fb8;
        --role-fifth: #d9649c;
        --role-extension: #28a87d;
        --role-flat: #3f7ee8;
        --role-sharp: #8d5cff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f4f6f8;
      }

      button,
      a,
      select {
        font: inherit;
      }

      main {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 0.4rem;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 4;
        display: grid;
        gap: 0.42rem;
        padding: 0.35rem 0 0.5rem;
        background: #f4f6f8;
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(5.5rem, 7rem) minmax(8rem, 13rem);
        gap: 0.35rem;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.24rem 0.58rem;
        align-items: center;
        padding: 0.08rem 0.02rem 0;
        font-size: 0.72rem;
        font-weight: 820;
        line-height: 1.1;
      }

      .legend span {
        white-space: nowrap;
      }

      .legend-root {
        color: var(--role-root);
      }

      .legend-seventh {
        color: var(--role-seventh);
      }

      .legend-third {
        color: var(--role-third);
      }

      .legend-fifth {
        color: var(--role-fifth);
      }

      .legend-extension {
        color: var(--role-extension);
      }

      .legend-flat {
        color: var(--role-flat);
      }

      .legend-sharp {
        color: var(--role-sharp);
      }

      .root-select,
      .family-filter,
      .download-link {
        width: 100%;
        min-height: 2.5rem;
        border: 1px solid #d6dce4;
        border-radius: 8px;
        background: #fff;
        color: #1f2430;
        font-size: 0.94rem;
        font-weight: 650;
      }

      .root-select,
      .family-filter {
        padding: 0 0.55rem;
      }

      .download-link {
        display: inline-grid;
        place-items: center;
        min-width: 7.2rem;
        padding: 0 0.7rem;
        text-decoration: none;
        white-space: nowrap;
      }

      .chord-list {
        display: grid;
        gap: 0.58rem;
      }

      .download-footer {
        display: flex;
        justify-content: center;
        padding: 1.1rem 0 0.5rem;
      }

      .chord-card {
        display: grid;
        grid-template-columns: 7.2rem minmax(0, 1fr);
        gap: 0.36rem;
        align-items: stretch;
        min-height: 21rem;
        padding: 0.28rem;
        border: 1px solid #d8dee7;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 8px 22px rgba(22, 27, 35, 0.07);
      }

      .meta {
        display: grid;
        align-content: start;
        gap: 0.38rem;
        min-width: 0;
      }

      .symbol {
        overflow: hidden;
        font-size: clamp(1rem, 4.4vw, 1.35rem);
        font-weight: 840;
        line-height: 1.05;
        letter-spacing: 0;
        text-overflow: clip;
        white-space: nowrap;
      }

      .quality,
      .scale-name,
      .relation {
        overflow: hidden;
        color: #4d5664;
        font-size: 0.72rem;
        font-weight: 720;
        line-height: 1.12;
        letter-spacing: 0;
      }

      .relation {
        display: -webkit-box;
        line-height: 1.2;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
      }

      .commonness {
        display: flex;
        gap: 0.12rem;
      }

      .dot {
        width: 0.48rem;
        height: 0.48rem;
        border-radius: 999px;
        background: #d9dee6;
      }

      .dot.is-on {
        background: #157a6e;
      }

      .scale-select {
        width: 100%;
        min-height: 2.1rem;
        border: 1px solid #d6dce4;
        border-radius: 8px;
        background: #fff;
        color: #202633;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .graphs {
        display: grid;
        grid-auto-rows: minmax(5.8rem, auto);
        gap: 0.34rem;
        min-width: 0;
      }

      .play-button {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        align-items: stretch;
        gap: 0.18rem;
        width: 100%;
        min-width: 0;
        min-height: 5.8rem;
        padding: 0.24rem;
        border: 1px solid #d8dee7;
        border-radius: 8px;
        background: #fbfcfd;
        color: inherit;
        text-align: left;
        cursor: pointer;
        touch-action: manipulation;
      }

      .play-button:active,
      .play-button.is-playing {
        border-color: #2f7dd3;
        background: #eef6ff;
      }

      .play-button.is-hidden {
        display: none;
      }

      .play-label {
        overflow: hidden;
        color: #263040;
        font-size: clamp(0.82rem, 3.1vw, 0.98rem);
        font-weight: 820;
        line-height: 1.08;
        letter-spacing: 0;
        text-overflow: clip;
        white-space: nowrap;
      }

      .keyboard {
        width: 100%;
        height: 4.45rem;
        overflow: hidden;
        pointer-events: none;
        display: flex;
        justify-content: center;
      }

      .keyboard svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .empty {
        min-height: 7rem;
        display: grid;
        place-items: center;
        color: #667080;
        font-weight: 720;
      }

      @media (max-width: 620px) {
        main {
          padding: 0.28rem;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .chord-card {
          grid-template-columns: 1fr;
          gap: 0.32rem;
        }

        .meta {
          grid-template-columns: minmax(5.4rem, auto) minmax(0, 1fr);
          align-items: center;
        }

        .symbol {
          grid-row: span 2;
        }

        .commonness {
          display: none;
        }

        .scale-select {
          grid-column: 1 / -1;
        }

        .relation {
          grid-column: 1 / -1;
          -webkit-line-clamp: 3;
        }

        .play-button {
          min-height: 5.75rem;
        }
      }

      @media (max-width: 380px) {
        .play-button {
          min-height: 5.55rem;
        }

        .keyboard {
          height: 4.2rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="controls">
          <select class="root-select" id="rootSelect" aria-label="Root"></select>
          <select class="family-filter" id="familyFilter" aria-label="Family"></select>
        </div>
        <div class="legend" aria-label="Color schema">
          <span class="legend-root">Root</span>
          <span class="legend-seventh">7th</span>
          <span class="legend-third">3rd</span>
          <span class="legend-fifth">5th</span>
          <span class="legend-extension">Extensions</span>
          <span class="legend-flat">Flats</span>
          <span class="legend-sharp">Sharps</span>
        </div>
      </header>
      <section class="chord-list" id="chordList" aria-live="polite"></section>
      <footer class="download-footer">
        <a class="download-link" href="chords-voicings-scales-reference.md" download>Download MD</a>
      </footer>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
